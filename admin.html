<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarkariSarthi 2.0 - Admin Dashboard</title>
    <link rel="icon" type="image/png" href="notification-icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .admin-login-box {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .admin-container {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .admin-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .admin-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .primary-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .primary-btn:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
        }

        .btn-danger:hover {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
        }

        .jobs-table-container {
            overflow-x: auto;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 1rem;
            padding: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: #94a3b8;
            font-weight: 500;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-buttons button {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="dark-mode">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="admin-overlay">
        <div class="admin-login-box">
            <h2>Admin Access</h2>
            <p style="color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.9rem;">Restricted area</p>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            </div>
            <button class="primary-btn" onclick="checkPassword()" style="width: 100%">Enter</button>
            <p id="loginError" style="color: #ef4444; margin-top: 1rem; display: none;">Incorrect password</p>
        </div>
    </div>

    <!-- Main Admin Container -->
    <div id="adminContainer" class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <button class="primary-btn" onclick="logout()">Logout</button>
        </div>

        <div class="admin-controls">
            <!-- GitHub Settings Card -->
            <div class="admin-card">
                <h3>GitHub API Settings</h3>
                <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 1rem;">Required to edit files & trigger workflows directly.</p>
                <div class="form-group">
                    <label>Personal Access Token (PAT)</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Repository (owner/repo)</label>
                    <input type="text" id="ghRepo" placeholder="username/SarkariSarthi_2.0">
                </div>
                <button class="primary-btn" onclick="saveSettings()">Save Settings</button>
                <span id="settingsStatus" style="margin-left: 1rem; font-size: 0.9rem; color: #10b981;"></span>
            </div>

            <!-- Workflow Actions Card -->
            <div class="admin-card">
                <h3>Actions</h3>
                <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 1rem;">Trigger GitHub actions manually.</p>
                <button class="primary-btn" onclick="triggerScraper()" style="width: 100%; margin-bottom: 1rem;">
                    Run Scraper Now
                </button>
                <button class="primary-btn" onclick="openAddJobModal()" style="width: 100%; background: linear-gradient(135deg, #10b981, #059669);">
                    Add Manual Job Entry
                </button>
            </div>
        </div>

        <!-- Jobs Management -->
        <div class="admin-card" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Manage Jobs (<span id="jobCount">0</span>)</h3>
                <button class="primary-btn" onclick="fetchJobsFromRepo()">Refresh Data</button>
            </div>

            <div class="jobs-table-container">
                <table id="jobsTable">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Department</th>
                            <th>Category</th>
                            <th>Last Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody">
                        <tr><td colspan="5" style="text-align: center;">Loading or no credentials provided...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Job Edit/Add Modal -->
    <div id="jobModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Edit Job</h2>
            <input type="hidden" id="jobId">

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" id="jobTitle" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="jobDepartment" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Category</label>
                    <select id="jobCategory">
                        <option value="UPSC">UPSC</option>
                        <option value="SSC">SSC</option>
                        <option value="Banking">Banking</option>
                        <option value="Railway">Railway</option>
                        <option value="Defence">Defence</option>
                        <option value="Police">Police</option>
                        <option value="Teaching">Teaching</option>
                        <option value="Other Govt Jobs">Other Govt Jobs</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Last Date</label>
                    <input type="text" id="jobLastDate" placeholder="e.g. 2024-05-30 or 'Not specified'">
                </div>
            </div>

            <div class="form-group">
                <label>Source URL</label>
                <input type="url" id="jobUrl">
            </div>

            <div class="form-group">
                <label>Summary (Optional)</label>
                <textarea id="jobSummary"></textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="primary-btn" onclick="saveJobData()" style="flex: 1;">Save Job to GitHub</button>
                <button class="primary-btn btn-danger" onclick="closeModal()" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
